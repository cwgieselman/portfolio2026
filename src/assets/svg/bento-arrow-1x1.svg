<svg
  id="bento-arrow-1x1"
  width="180"
  height="180"
  viewBox="0 0 180 180"
  fill="none"
  xmlns="http://www.w3.org/2000/svg"
>
  <!--
    bento-arrow-1x1.svg
    ─────────────────────────────────────────────────────────────────
    Cell: 140×140px | Bleed: 20px all sides | viewBox: 180×180
    Cell rect origin: 20,20

    Each arrow stub = two paths:
      __fill   — closed triangle, fill: var(--cell-bg), no stroke
      __stroke — open path (two sides only), stroke: var(--cell-border), no fill
    The base edge is never drawn, so the arrow reads as
    an extension of the cell surface, not a separate shape.

    Activate by translating the stub group 20px outward:
      top:   translateY(-20px)
      right: translateX(20px)
      down:  translateY(20px)
      left:  translateX(-20px)
    ─────────────────────────────────────────────────────────────────
  -->

  <!-- TOP — tip at y=20, base at y=40, centered x=90 -->
  <g id="bento-article__arrow-top">
    <path class="arrow-stroke" d="M70 40 L90 20 L110 40" />
    <path class="arrow-fill"   d="M90 20 L70 40 H110 Z" />
  </g>

  <!-- RIGHT — tip at x=160, base at x=140, centered y=90 -->
  <g id="bento-article__arrow-right">
    <path class="arrow-stroke" d="M140 70 L160 90 L140 110" />
    <path class="arrow-fill"   d="M160 90 L140 70 V110 Z" />
  </g>

  <!-- DOWN — tip at y=160, base at y=140, centered x=90 -->
  <g id="bento-article__arrow-down">
    <path class="arrow-stroke" d="M70 140 L90 160 L110 140" />
    <path class="arrow-fill"   d="M90 160 L70 140 H110 Z" />
  </g>

  <!-- LEFT — tip at x=20, base at x=40, centered y=90 -->
  <g id="bento-article__arrow-left">
    <path class="arrow-stroke" d="M40 70 L20 90 L40 110" />
    <path class="arrow-fill"   d="M20 90 L40 70 V110 Z" />
  </g>

</svg>
