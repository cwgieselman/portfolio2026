id: bento-article
name: bento-article
njk: components/bento-grid.njk
desc: YAML-driven bento grid container
tags:
  - layout
  - grid
  - YAML
links:
  figma: ~
  netlify: https://cwgport26.netlify.app

variants:
  - label: "the arrow problem"
    desc: "3x2 grid, white theme, stat + image + body cells"
    bento:
      id: ds-bento-arrow-problem
      cols: 5
      rows: 2
      cells:
        - id: article-01
          type: content
          theme: white
          desktop:
            col: "1 / 3"
            row: "1 / 3"
          content: |
            <span class="bento-stat">3x</span>
            <span class="bento-body">arrow implementation attempts</span>
        - id: article-02
          type: image
          desktop:
            col: "3 / 6"
            row: "1 / 2"
          media:
            src: "TODO:src"
            hasAlt: false
        - id: article-03
          type: content
          theme: white
          desktop:
            col: "3 / 5"
            row: "2 / 3"
          content: |
            <span class="bento-body">SVG partial: Figma returned raster</span>
        - id: article-04
          type: content
          theme: white
          desktop:
            col: "5 / 6"
            row: "2 / 3"
          content: |
            <span class="bento-body">::after triangle: lost continuous-stroke intent</span>

  - label: "the compile party"
    desc: "3x2 grid, primary-dark theme"
    bento:
      id: ds-bento-compile-party
      cols: 5
      rows: 2
      cells:
        - id: article-01
          type: content
          theme: primary-dark
          desktop:
            col: "1 / 3"
            row: "1 / 3"
          content: |
            <span class="bento-stat">3</span>
            <span class="bento-body">case studies in the compile party queue</span>
        - id: article-02
          type: content
          theme: primary-dark
          desktop:
            col: "3 / 6"
            row: "1 / 2"
          content: |
            <span class="bento-lead">BMTx - INFICON IMS - Impact Manager</span>
        - id: article-03
          type: content
          theme: primary-dark
          desktop:
            col: "3 / 5"
            row: "2 / 3"
          content: |
            <span class="bento-body">slot-first contract</span>
        - id: article-04
          type: content
          theme: primary-dark
          desktop:
            col: "5 / 6"
            row: "2 / 3"
          content: |
            <span class="bento-body">TODO:src flagged</span>

contract:
  - field: "bento.id"
    type: string
    required: true
    desc: "Kebab-case. Drives #bento--{id} and placements SCSS selector."
  - field: "bento.cols"
    type: number
    required: true
    desc: "Column count. Reference only — actual grid tracks in placements SCSS."
  - field: "bento.rows"
    type: number
    required: true
    desc: "Row count. Reference only — actual grid tracks in placements SCSS."
  - field: "bento.cells[]"
    type: array
    required: true
    desc: "One entry per cell. Order matches visual reading order."
  - field: "bento.cells[].id"
    type: string
    required: true
    desc: "article-NN format. Drives grid-area name (article-01 to a01)."
  - field: "bento.cells[].type"
    type: string
    required: true
    desc: "content | image | graphic. Drives bento-cell--{type} class."
  - field: "bento.cells[].theme"
    type: string
    required: false
    desc: "white | primary-dark | primary-light | secondary-dark | secondary-light. Omit for image cells."
  - field: "bento.cells[].content"
    type: string
    required: false
    desc: "Raw HTML block rendered via | safe. Use bento-stat, bento-lead, bento-body spans."
  - field: "bento.cells[].media"
    type: object
    required: false
    desc: "Image cell data. Passed to media.njk include."
  - field: "bento.cells[].artDirection"
    type: boolean
    required: false
    desc: "true triggers picture element with src (5-up) + mobileSrc (2-up) crops."
  - field: "bento.cells[].scrollable"
    type: boolean
    required: false
    desc: "true triggers two-sibling render. Requires media.scrollSrc."

usage:
  do:
    - "Let the content determine the grid configuration, not the other way around."
    - "Use bento-stat, bento-lead, bento-body spans inside content blocks for correct type rendering."
    - "Placement CSS lives in placements/_<pageKey>.scss on #bento--<id>. Write it there, not inline."
  dont:
    - "Don't call get_design_context on root or section Figma nodes. It swallows the page and returns React."
    - "Don't use aspect-ratio: 1/1 on individual cells — it breaks multi-cell spans."
  gotchas:
    - "Span count is not end line. col 5 + colSpan 2 ends at line 7, not 6. Verify in _site output."
    - "bento-arrow.njk is dead. Delete it."
    - "Figma MCP returns raster PNG for Union/Boolean nodes. For SVG paths use REST API GET /v1/images?format=svg."
    - "arrow: fields exist in page.yml on articles 01, 04, 06, 08, 09, 10, 11. Arrows do not yet exist."
    - "Double-hyphen YAML filenames trigger a Nunjucks parse bug. Use single hyphens."
  a11y:
    - attr: "aria-details"
      desc: "Set on content cell when arrow field is present. Points to related image cell ID. Pending arrow implementation."
    - attr: "role=region + aria-label"
      desc: "Applied automatically to scrollable image cells."
  related:
    - figure
    - media

changelog:
  - ver: "0.5"
    date: "Mar 2026"
    note: "bento-arrow.njk deleted. isCustom escape hatch documented."
  - ver: "0.4"
    date: "Mar 2026"
    note: "Concept renamed bento-article. bento-grid.njk filename unchanged."
  - ver: "0.3"
    date: "Feb 2026"
    note: "Arrow attempt 2: CSS ::after. Continuous-stroke intent lost."
  - ver: "0.2"
    date: "Feb 2026"
    note: "Arrow attempt 1: inline SVG partial. Figma MCP returned raster."
  - ver: "0.1"
    date: "Nov 2025"
    note: "Initial build. No arrows. Blissfully unaware."
