pageKey: "inficon-impact-manager"

# ─────────────────────────────────────────────────────────────────────────────
# YAML Architecture — inficon-impact-manager
#
# Hierarchy: sections → chapters → pages
#
#   Section   — one assembled bento composition. The bento IS the section.
#               Has an explicit skeleton map declaring which grid positions
#               receive skeleton outlines on load. Dots = permanently empty.
#               Multiple chapters live inside one section.
#
#   Chapter   — one left-column narrative unit. Has field text + N pages.
#               Owns a slice of the section's bento grid.
#               chapterOffset: rows of overlap with the previous chapter.
#               (0 = no overlap, 1 = share one row with prev chapter)
#               fieldTextRow: which row of the chapter grid the field text
#               aligns to (1 = top, 2 = second row, etc.)
#
#   Page      — one beat. One bento slice. Stacks with sibling pages
#               at the same grid origin within the chapter.
#
# Bento IDs:   inficon--im--[sectionKey]-[chapterKey]-[pageKey]
# Wrapper IDs: content--[sectionKey]--[chapterKey]--[pageKey]--cell-[N]
# ─────────────────────────────────────────────────────────────────────────────

sections:

  # ───────────────────────────────────────────────────────────────────────────
  # SECTION 01 — The Place, The Stakes, The Work
  #
  # Visual composite: 4 cols × 7 rows
  # Mechanical: two 4×4 chapter grids with 1-row overlap at row 4 / row 1
  #
  # Skeleton map — 4×7 composite:
  #   Rows 1-4: chapter-01 grid
  #   Row 4 = row 1 of chapter-02 (overlap row — no skeleton, covered by ch01)
  #   Rows 5-7 (ch02 rows 2-4): skeleton positions per chapter-02 design
  #
  #   s = skeleton cell
  #   . = permanently empty (no skeleton, no content)
  # ───────────────────────────────────────────────────────────────────────────
  - sectionKey: "section-01"
    mode: "choreographed"

    # Section header
    header:
      level: "h1"
      headline: "INFICON Intelligent Manufacturing Systems"
      showEyebrow: true
      eyebrow: "UX/UI Design · Design Systems · Product Strategy"
      showSubhead: true
      subhead: "13 months as the first UX designer in the IMS Group building the next generation of software for semiconductor fabrication facilities."

    # Full 4×7 skeleton map for Section 01
    # Row 4 of chapter-01 = row 1 of chapter-02 (overlap) — no skeleton row needed
    # as chapter-01 real cells cover that row visually.
    skeleton:
      cols: 4
      rows: 7
      areas:
        - ".  s  s  s"    # row 1  (ch01 r1 — col 1 permanently empty)
        - "s  s  s  s"    # row 2  (ch01 r2)
        - "s  s  s  s"    # row 3  (ch01 r3)
        - "s  s  s  s"    # row 4  (ch01 r4 / ch02 r1 overlap — skeleton from ch01 p03)
        - ".  s  s  s"    # row 5  (ch02 r2 — col 1 permanently empty)
        - "s  s  s  s"    # row 6  (ch02 r3)
        - "s  s  s  s"    # row 7  (ch02 r4)

    chapters:

      # ───────────────────────────────────────────────────────────────────────
      # CHAPTER 01 — The Place & Stakes
      # Grid: 4×4. Rows 1-4 of section composite.
      # chapterOffset: 0 (first chapter, no overlap with previous)
      # fieldTextRow: 1 (field text aligns to top of chapter)
      # ───────────────────────────────────────────────────────────────────────
      - chapterKey: "chapter-01"
        chapterOffset: 0
        fieldTextRow: 1
        fieldText: "Four weeks into the role, I was on a plane to Grenoble, France. The customer had withheld their signature. They wanted to see what professional design involvement actually looked like."

        pages:

          # ── Page 01 — Alps & Cleanroom ──────────────────────────────────
          # Rows 1-2 of chapter-01 (rows 1-2 of section)
          # Skeleton positions in this page's frame (empty bento-article instances):
          #   row2 col1, row2 col2, row2 col3
          #   row3 col1-4, row4 col1-4 (rows 3-4 registered for later pages)
          - pageKey: "page-01"
            cells:
              - wrapper: "content--section-01--chapter-01--page-01--cell-01"
                bento:
                  id: "inficon--im--s01-c01-p01"
                  cols: 4
                  rows: 2
                  cells:
                    - id: article-01
                      type: image
                      artDirection: true
                      desktop:
                        col: "2 / 4"
                        row: "1 / 2"
                      media:
                        src: "/assets/images/inficon--photo--st-facility-france.jpg"
                        mobileSrc: "/assets/images/inficon--photo--st-facility-france--CROP.jpg"
                        hasAlt: true
                        alt: "The ST Microelectronics facility in Crolles, France — a large semiconductor FAB with the French Alps visible in the background."
                        sizes: "40vw"
                        cssClass: "bento-cell__img"

                    - id: article-02
                      type: image
                      desktop:
                        col: "4 / 5"
                        row: "1 / 3"
                      media:
                        src: "/assets/images/inficon--photo--me-in-cleansuit.jpg"
                        hasAlt: true
                        alt: "Craig in a full cleanroom suit, ready to make some chips. At the pilot FAB in Crolles, France."
                        sizes: "20vw"
                        cssClass: "bento-cell__img"

          # ── Page 02 — Rendering, Stat, Island ───────────────────────────
          # Rows 2-3 of chapter-01 (rows 2-3 of section)
          - pageKey: "page-02"
            cells:
              - wrapper: "content--section-01--chapter-01--page-02--cell-01"
                bento:
                  id: "inficon--im--s01-c01-p02"
                  cols: 4
                  rows: 3
                  cells:
                    - id: article-01
                      type: image
                      desktop:
                        col: "1 / 3"
                        row: "2 / 4"
                      media:
                        src: "/assets/images/inficon--photo--rocc-rendering.jpg"
                        hasAlt: true
                        alt: "An artist's rendering of the new control center the new software would operate in."
                        sizes: "40vw"
                        cssClass: "bento-cell__img"

                    - id: article-02
                      type: content
                      theme: primary-dark
                      desktop:
                        col: "3 / 4"
                        row: "2 / 3"
                      content: |
                        <span class="bento-stat">1</span>
                        <span class="bento-body">Week on-site at the pilot facility:</span>

                    - id: article-03
                      type: image
                      artDirection: true
                      desktop:
                        col: "3 / 5"
                        row: "3 / 4"
                      media:
                        src: "/assets/images/inficon--photo--rocc-workshop-island.jpg"
                        mobileSrc: "/assets/images/inficon--photo--rocc-workshop-island--CROP.jpg"
                        hasAlt: true
                        alt: "A Workshop Island in the control room with wall-mounted screens showing localized production data and individual workstations."
                        sizes: "40vw"
                        cssClass: "bento-cell__img"

          # ── Page 03 — The Quote ──────────────────────────────────────────
          # Row 4 of chapter-01 (row 4 of section / row 1 of chapter-02 overlap)
          # Note: article-01 has custom: true — selfie is a ::before pseudo-element.
          # Skeleton positions in this page's frame:
          #   row4 col3, row4 col4 (these ARE skeleton positions per Figma)
          - pageKey: "page-03"
            cells:
              - wrapper: "content--section-01--chapter-01--page-03--cell-01"
                bento:
                  id: "inficon--im--s01-c01-p03"
                  cols: 4
                  rows: 4
                  cells:
                    - id: article-01
                      type: content
                      theme: default
                      custom: true
                      desktop:
                        col: "1 / 3"
                        row: "4 / 5"
                      content: |
                        <span class="bento-lead-italic">"How can we make THIS</span>
                        <span class="bento-body">&lt;waves hand at the room as it is today&gt;</span>
                        <span class="bento-lead-italic">more useful to you?"</span>

      # ───────────────────────────────────────────────────────────────────────
      # CHAPTER 02 — Week One Work
      # Grid: 4×4. Rows 4-7 of section composite (1-row overlap with ch01).
      # chapterOffset: 1 (shares row 4/row 1 with chapter-01)
      # fieldTextRow: 2 (field text aligns to row 2 — overlap row is visual only)
      # ───────────────────────────────────────────────────────────────────────
      - chapterKey: "chapter-02"
        chapterOffset: 1
        fieldTextRow: 2
        fieldText: "The FAB was the brief. Before designing anything, I needed to understand how the people inside it actually worked — and what the tools they were using were failing to do."

        pages:

          # ── Page 01 — Workshop Text + UI Composite ──────────────────────
          # Rows 1-2 of chapter-02 (overlap row + row 5 of section)
          # article-01: Workshop description text + anomaly UI screenshot
          #   Position: col 3/5, row 1/3 (2×2 span)
          - pageKey: "page-01"
            cells:
              - wrapper: "content--section-01--chapter-02--page-01--cell-01"
                bento:
                  id: "inficon--im--s01-c02-p01"
                  cols: 4
                  rows: 2
                  cells:
                    - id: article-01
                      type: content
                      theme: primary-light
                      desktop:
                        col: "3 / 5"
                        row: "1 / 3"
                      content: |
                        <span class="bento-body">Each <span class="bento-body-bold">Workshop</span> in the FAB has its own 'Island' with a central display of localized data and individual workstations for the <span class="bento-body-bold">Actors</span> assigned to that Workshop</span>
                        <img class="bento-cell__screenshot" src="/assets/images/inficon--screen--anomaly-ui-st.png" alt="" role="presentation" />

          # ── Page 02 — FigJam + Text Cells ───────────────────────────────
          # Rows 2-4 of chapter-02 (rows 5-7 of section)
          # article-01: "Replacing this interface..." — col 2, row 2
          # article-02: FigJam screenshot — col 1/4, row 3/5 (3×2 span)
          # article-03: "We saw the tool reporting..." — col 4, row 3
          # article-04: "and I mapped..." — col 4, row 4
          - pageKey: "page-02"
            cells:
              - wrapper: "content--section-01--chapter-02--page-02--cell-01"
                bento:
                  id: "inficon--im--s01-c02-p02"
                  cols: 4
                  rows: 4
                  cells:
                    - id: article-01
                      type: content
                      theme: secondary-dark
                      desktop:
                        col: "2 / 3"
                        row: "2 / 3"
                      content: |
                        <span class="bento-body">Replacing this interface from the Island workstations was the focus of <span class="bento-body-bold">Phase 1</span>.</span>

                    - id: article-02
                      type: image
                      scrollable: true
                      desktop:
                        col: "1 / 4"
                        row: "3 / 5"
                      media:
                        src: "/assets/images/inficon--screen--anomaly-app-figjam.png"
                        scrollSrc: "/assets/images/inficon--screen--anomaly-app-figjam.png"
                        hasAlt: true
                        alt: "FigJam mapping of the legacy anomaly workstation interface — inputs, workflows, and display states documented in collaboration with Actors during discovery."
                        sizes: "55vw"
                        cssClass: "bento-cell__img"

                    - id: article-03
                      type: content
                      theme: secondary-light
                      desktop:
                        col: "4 / 5"
                        row: "3 / 4"
                      content: |
                        <span class="bento-body">We saw the tool reporting data and spreadsheets used to identify anomalies manually.</span>

                    - id: article-04
                      type: content
                      theme: primary-light
                      desktop:
                        col: "4 / 5"
                        row: "4 / 5"
                      content: |
                        <span class="bento-body">and I mapped the functionality of the interface technicians used to assign and log the fixes.</span>
