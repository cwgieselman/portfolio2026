                sizes: "40vw"
                cssClass: "mosaic-tile__img"

            - id: article-02
              type: frame
              theme: primary-dark
              desktop:
                col: "3 / 4"
                row: "2 / 3"
              content: |
                <span class="mosaic-stat">1</span>
                <span class="mosaic-body">Week on-site at the pilot facility:</span>

            - id: article-03
              type: bleed
              theme: default
              artDirection: true
              desktop:
                col: "3 / 5"
                row: "3 / 4"
              media:
                src: "/assets/images/inficon--photo--rocc-workshop-island.jpg"
                mobileSrc: "/assets/images/inficon--photo--rocc-workshop-island--CROP.jpg"
                hasAlt: true
                alt: "A Workshop Island in the control room with wall-mounted screens showing localized production data and individual workstations."
                sizes: "40vw"
                cssClass: "mosaic-tile__img"

      - pageKey: "page-03"
        mosaic:
          id: "inficon--im--s01-c01-p03"
          cols: 4
          rows: 4
          tiles:
            - id: article-01
              type: frame
              custom: true
              variant: selfie
              theme: default
              desktop:
                col: "1 / 3"
                row: "4 / 5"
              description: "Decorative portrait photo rendered as a CSS ::before pseudo-element on the quote cell. Positioned left of the cell at desktop, below at mobile, bridging rows 3–4. Image path and placement in placements SCSS."
              content: |
                <span class="mosaic-lead-italic">"How can we make THIS</span>
                <span class="mosaic-body">&lt;waves hand at the room as it is today&gt;</span>
                <span class="mosaic-lead-italic">more useful to you?"</span>

