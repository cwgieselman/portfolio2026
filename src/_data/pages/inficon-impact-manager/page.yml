          cols: 4
          rows: 2
          tiles:
            - id: article-01
              type: frame
              theme: primary-light
              desktop:
                col: "3 / 5"
                row: "1 / 3"
              content: |
                <span class="mosaic-body">Each <span class="mosaic-body-bold">Workshop</span> in the FAB has its own 'Island' with a central display of localized data and individual workstations for the <span class="mosaic-body-bold">Actors</span> assigned to that Workshop</span>
                <img class="mosaic-tile__screenshot" src="/assets/images/inficon--screen--anomaly-ui-st.png" alt="" role="presentation" />

