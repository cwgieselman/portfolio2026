              theme: secondary-dark
              desktop:
                col: "2 / 3"
                row: "2 / 3"
              content: |
                <span class="mosaic-body">Replacing this interface from the Island workstations was the focus of <span class="mosaic-body-bold">Phase 1</span>.</span>

