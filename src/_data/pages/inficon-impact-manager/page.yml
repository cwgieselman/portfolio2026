pageKey: "inficon-impact-manager"
sections:
  - sectionKey: "section-01"
    mode: "choreographed"
    pages:
      # ─────────────────────────────────────────────────────────────────────────
      # PAGE 01 — Header block
      # ─────────────────────────────────────────────────────────────────────────
      - pageKey: "page-01"
        cells:
          - wrapper: "header--section-01--page-01--content-cell-01"
            includes:
              - include: "components/header.njk"
                params:
                  level: "h1"
                  headline: "INFICON Intelligent Manufacturing Systems"
                  showEyebrow: true
                  eyebrow: "UX/UI Design · Design Systems · Product Strategy"
                  showSubhead: true
                  subhead: "13 months as the first UX designer in the IMS Group building the next generation of software for semiconductor fabrication facilities."

      # ─────────────────────────────────────────────────────────────────────────
      # PAGE 02 — Beat 01: The Place & Stakes
      # ─────────────────────────────────────────────────────────────────────────
      - pageKey: "page-02"
        cells:
          - wrapper: "content--section-01--page-02--content-cell-01"
            includes:
              - include: "components/richtext.njk"
                params:
                  kind: "p"
                  cssClass: "field-text"
                  text: "Four weeks into the role, I was on a plane to Grenoble, France. The customer had withheld their signature. They wanted to see what professional design involvement actually looked like."

          - wrapper: "content--section-01--page-02--content-cell-02"
            bento:
              id: "inficon--im-beat-01"
              cols: 4
              rows: 2
              cells:
                - id: article-01
                  type: image
                  artDirection: true
                  desktop:
                    col: "2 / 4"
                    row: "1 / 2"
                  media:
                    src: "/assets/images/inficon--photo--st-facility-alps.jpg"
                    mobileSrc: "/assets/images/inficon--photo--st-facility-alps--CROP.jpg"
                    hasAlt: true
                    alt: "The ST Microelectronics facility in Crolles, France — a large semiconductor FAB with the French Alps visible in the background."
                    sizes: "40vw"
                    cssClass: "bento-cell__img"

                - id: article-02
                  type: image
                  desktop:
                    col: "4 / 5"
                    row: "1 / 3"
                  media:
                    src: "/assets/images/inficon--photo--craig-cleanroom-full.jpg"
                    hasAlt: true
                    alt: "Craig in a full cleanroom suit, thumbs up, at the pilot FAB in Crolles, France."
                    sizes: "20vw"
                    cssClass: "bento-cell__img"

      # ─────────────────────────────────────────────────────────────────────────
      # PAGE 03 — Beat 02: Week One Work
      # ─────────────────────────────────────────────────────────────────────────
      - pageKey: "page-03"
        cells:
          - wrapper: "content--section-01--page-03--content-cell-01"
            bento:
              id: "inficon--im-beat-02"
              cols: 4
              rows: 3
              cells:
                - id: article-01
                  type: image
                  desktop:
                    col: "1 / 3"
                    row: "2 / 4"
                  media:
                    src: "/assets/images/inficon--photo--rocc-rendering-full.jpg"
                    hasAlt: true
                    alt: "The ROCC central display at the pilot FAB — a large monitor wall showing aggregated production data across the entire facility."
                    sizes: "40vw"
                    cssClass: "bento-cell__img"

                - id: article-02
                  type: content
                  theme: primary-dark
                  desktop:
                    col: "3 / 4"
                    row: "2 / 3"
                  content: |
                    <span class="bento-stat">1</span>
                    <span class="bento-body">Week on-site at the pilot facility:</span>

                - id: article-03
                  type: image
                  artDirection: true
                  desktop:
                    col: "3 / 5"
                    row: "3 / 4"
                  media:
                    src: "/assets/images/inficon--photo--rocc-island.jpg"
                    mobileSrc: "/assets/images/inficon--photo--rocc-island--CROP.jpg"
                    hasAlt: true
                    alt: "A Workshop Island display showing localized production data for a specific area of the FAB, with individual Actor workstations surrounding it."
                    sizes: "40vw"
                    cssClass: "bento-cell__img"

      # ─────────────────────────────────────────────────────────────────────────
      # PAGE 04 — Beat 03: The Quote
      # Note: The selfie cell is a ::before pseudo-element on article-01,
      # authored in placements/_inficon-impact-manager.scss.
      # It hangs left of the quote cell on desktop, drops below on mobile.
      # article-01 has custom: true to signal the one-off placement override.
      # ─────────────────────────────────────────────────────────────────────────
      - pageKey: "page-04"
        cells:
          - wrapper: "content--section-01--page-04--content-cell-01"
            bento:
              id: "inficon--im-beat-03"
              cols: 4
              rows: 4
              cells:
                - id: article-01
                  type: content
                  theme: secondary-dark
                  custom: true
                  desktop:
                    col: "1 / 3"
                    row: "4 / 5"
                  content: |
                    <span class="bento-lead-italic">"How can we make THIS</span>
                    <span class="bento-body">&lt;waves hand at the room as it is today&gt;</span>
                    <span class="bento-lead-italic">more useful to you?"</span>
