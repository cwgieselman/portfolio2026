# inficon--discovery-bento.yml
# ─────────────────────────────────────────────────────────────────────────────
# INFICON discovery bento grid — reference data file.
#
# Grid is 5 columns × 5 rows at desktop.
# Source geometry: 168px cells, 10px gaps, 880×880px total canvas.
# Placements derived from Figma absolute positions (x, y, w, h):
#   col/row lines: 0=1, 178=2, 356=3, 534=4, 712=5, 880=6
#
# Mobile: 2-col collapse. Rough ordering only — not editorially finalized.
# Arrow pointer decorations: deferred.
# ─────────────────────────────────────────────────────────────────────────────

bento:
  id: inficon--discovery
  variant: full-width
  cols: 5
  rows: 5

  cells:

    # box-00 — 1×1 — dark blue stat: "A week at the pilot facility in France"
    # Figma: x=0, y=0, w=168, h=168
    - id: box-00
      type: stat
      theme: primary-dark
      desktop:
        col: "1 / 2"
        row: "1 / 2"
      mobile:
        col: "1 / 2"
        row: "1 / 2"
      content:
        value: "1 week"
        label: "at the pilot facility in France"

    # box-01 — 2×1 wide — yellow pull quote
    # Figma: x=178, y=0, w=346, h=168
    - id: box-01
      type: text
      theme: secondary-dark
      desktop:
        col: "2 / 4"
        row: "1 / 2"
      mobile:
        col: "1 / 3"
        row: "2 / 3"
      content:
        lede: '"How can we make THIS more useful to you?"'
        body: "<waves hand at the room as it is today>"

    # box-02 — 2×1 wide — facility photo
    # Figma: x=534, y=0, w=346, h=168
    - id: box-02
      type: image
      desktop:
        col: "4 / 6"
        row: "1 / 2"
      mobile:
        col: "1 / 3"
        row: "3 / 4"
      content:
        src: "/assets/images/inficon--facility-photo.jpg"
        alt: ""

    # box-03 — 1×1 — blue text: control room description
    # Figma: x=0, y=178, w=168, h=168
    - id: box-03
      type: text
      theme: primary-light
      desktop:
        col: "1 / 2"
        row: "2 / 3"
      mobile:
        col: "1 / 2"
        row: "4 / 5"
      content:
        body: "The Control Room had a huge central display with data aggregated from the entire FAB."

    # box-04 — 2×1 wide — control room photo
    # Figma: x=178, y=178, w=346, h=168
    - id: box-04
      type: image
      desktop:
        col: "2 / 4"
        row: "2 / 3"
      mobile:
        col: "1 / 3"
        row: "5 / 6"
      content:
        src: "/assets/images/inficon--control-room.jpg"
        alt: ""

    # box-05 — 2×2 — workshop text + screenshot composite
    # Figma: x=534, y=178, w=346, h=346
    - id: box-05
      type: composite
      theme: primary-light
      desktop:
        col: "4 / 6"
        row: "2 / 4"
      mobile:
        col: "1 / 3"
        row: "6 / 8"
      content:
        body: "Each Workshop has its own 'Island' with a display of localized data and multiple individual workstations:"
        src: "/assets/images/inficon--workshop-interface.png"
        alt: "Workshop island interface screenshot"

    # box-06 — 3×2 wide — large FigJam / process mapping image
    # Figma: x=0, y=356, w=524, h=346
    # Mobile: shrinks to full 2-col width (can't span 3 at 2-col)
    - id: box-06
      type: image
      desktop:
        col: "1 / 4"
        row: "3 / 5"
      mobile:
        col: "1 / 3"
        row: "8 / 10"
      content:
        src: "/assets/images/inficon--figjam-mapping.png"
        alt: ""

    # box-07 — 2×1 wide — dark blue text: v1 focus statement
    # Figma: x=534, y=534, w=346, h=168
    - id: box-07
      type: text
      theme: primary-dark
      desktop:
        col: "4 / 6"
        row: "4 / 5"
      mobile:
        col: "1 / 3"
        row: "10 / 11"
      content:
        body: "This interface was the focus of v1, so a thorough mapping of all inputs, workflows and displays was established before heading home."

    # box-08 — 2×1 wide — yellow text: gather/cluster/prioritize
    # Figma: x=0, y=712, w=346, h=168
    - id: box-08
      type: text
      theme: secondary-light
      desktop:
        col: "1 / 3"
        row: "5 / 6"
      mobile:
        col: "1 / 3"
        row: "11 / 12"
      content:
        body: "Discovery Workshops with Users, managers and executives provided context and insight to the observational and technical data."
        lede: "Gather → Cluster → Prioritize"

    # box-09 — 1×1 — sticky note scatter image
    # Figma: x=356, y=712, w=168, h=168
    - id: box-09
      type: image
      desktop:
        col: "3 / 4"
        row: "5 / 6"
      mobile:
        col: "1 / 2"
        row: "12 / 13"
      content:
        src: "/assets/images/inficon--stickies-01.png"
        alt: ""

    # box-10 — 1×1 — sticky note scatter image
    # Figma: x=534, y=712, w=168, h=168
    - id: box-10
      type: image
      desktop:
        col: "4 / 5"
        row: "5 / 6"
      mobile:
        col: "2 / 3"
        row: "12 / 13"
      content:
        src: "/assets/images/inficon--stickies-02.png"
        alt: ""

    # box-11 — 1×1 — sticky note scatter image
    # Figma: x=712, y=712, w=168, h=168
    - id: box-11
      type: image
      desktop:
        col: "5 / 6"
        row: "5 / 6"
      mobile:
        col: "1 / 2"
        row: "13 / 14"
      content:
        src: "/assets/images/inficon--stickies-03.png"
        alt: ""
